<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARG - 欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 细微扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 微弱的噪点纹理 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 40px 24px;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-size: 2.2rem;
            letter-spacing: 0.2em;
            font-weight: 400;
            color: #f0f0f0;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .main-title .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: #ffffff;
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .sub-text {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #aaaaaa;
            margin-bottom: 36px;
        }

        .button-group {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #cccccc;
            padding: 10px 28px;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
        }

        .btn:hover {
            border-color: rgba(255, 255, 255, 0.7);
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
        }

        .btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            width: 60%;
            height: 1px;
            background: rgba(255, 255, 255, 0);
            transition: background 0.25s ease;
        }

        .btn:hover::after {
            background: rgba(255, 255, 255, 0.4);
        }

        /* 底部微小标记 */
        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="main-title">欢迎。<span class="cursor"></span></p>
        <p class="sub-text">Welcome.</p>

        <div class="button-group">
            <a href="messages.html" class="btn">消息</a>
            <a href="#" class="btn" onclick="alert('档案页面待接入')">档案</a>
            <a href="#" class="btn" onclick="alert('？？？页面待接入')">？？？</a>
        </div>
    </div>

    <div class="sigil">◆</div>

</body>
</html>
