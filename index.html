<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARG - 等待指示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
        }

        /* 扫描线效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 噪点纹理 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* 通用覆盖层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 倒计时数字 */
        #countdown .number {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 700;
            color: #ff1a1a;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7), 0 0 60px rgba(255, 0, 0, 0.3);
            letter-spacing: 0.1em;
            font-family: "Courier New", "Fira Code", monospace;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
                transform: scale(1.02);
            }
        }

        /* 故障动画 */
        .glitch-text {
            font-family: "Courier New", "Fira Code", monospace;
            font-size: clamp(2rem, 8vw, 4rem);
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            position: relative;
            animation: glitchSkew 0.15s infinite;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: 'SIGNAL LOST';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.7;
        }

        .glitch-text::before {
            color: #00ffff;
            z-index: -1;
            animation: glitchShift1 0.2s infinite;
        }

        .glitch-text::after {
            color: #ff00ff;
            z-index: -2;
            animation: glitchShift2 0.2s infinite;
        }

        @keyframes glitchSkew {
            0% {
                transform: translate(0);
            }
            25% {
                transform: translate(-3px, 2px) skew(2deg);
            }
            50% {
                transform: translate(3px, -1px) skew(-1deg);
            }
            75% {
                transform: translate(-1px, -2px) skew(1deg);
            }
            100% {
                transform: translate(0);
            }
        }

        @keyframes glitchShift1 {
            0%,
            100% {
                transform: translate(0);
            }
            50% {
                transform: translate(-5px, 3px);
            }
        }

        @keyframes glitchShift2 {
            0%,
            100% {
                transform: translate(0);
            }
            50% {
                transform: translate(5px, -3px);
            }
        }

        /* 故障背景闪烁 */
        .glitch-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            background: #000;
            animation: bgFlash 0.1s infinite;
        }

        @keyframes bgFlash {
            0%,
            100% {
                background: #000;
            }
            50% {
                background: #1a0000;
            }
        }

        /* 最终等待界面容器 */
        #main {
            text-align: center;
            z-index: 1;
            /* 需要高于overlay？不，main本身也是overlay，但我们要将它放在普通流或overlay */
            /* 我们将main设为overlay类，这样它也能居中显示 */
        }

        .line {
            font-size: 1.25rem;
            letter-spacing: 0.12em;
            line-height: 2;
            font-weight: 400;
            color: #f0f0f0;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
        }

        .line.cn {
            font-size: 1.35rem;
            letter-spacing: 0.15em;
        }

        .line.en {
            font-size: 1rem;
            letter-spacing: 0.1em;
            color: #cccccc;
            margin-top: 2px;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.25);
            margin: 16px auto;
            border: none;
        }

        .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: #ffffff;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: #888888;
        }

        /* 主界面淡入动画 */
        .fade-in {
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 隐藏类（用于覆盖层） */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 倒计时覆盖层 -->
    <div id="countdown" class="overlay hidden">
        <span class="number" id="countdown-number">10</span>
    </div>

    <!-- 故障动画覆盖层 -->
    <div id="glitch" class="overlay hidden">
        <div class="glitch-text">SIGNAL LOST</div>
    </div>
    <!-- 故障时的背景闪烁层 -->
    <div id="glitch-bg" class="glitch-bg hidden"></div>

    <!-- 最终等待界面覆盖层 -->
    <div id="main" class="overlay hidden">
        <div class="fade-in">
            <p class="line cn">欢迎来到此地。<span class="cursor"></span></p>
            <hr class="divider">
            <p class="line en">Welcome to this place.</p>
            <p class="line en" style="margin-top:6px;">Please wait for instructions.</p>
            <p class="line cn" style="margin-top:4px;">请等待指示。</p>
        </div>
        <div class="sigil">◆</div>
    </div>

    <script>
        (function() {
            const countdownOverlay = document.getElementById('countdown');
            const glitchOverlay = document.getElementById('glitch');
            const glitchBg = document.getElementById('glitch-bg');
            const mainOverlay = document.getElementById('main');
            const countdownNumber = document.getElementById('countdown-number');

            // 初始全部隐藏（已经通过hidden类实现）

            // 2.5秒后显示倒计时
            setTimeout(() => {
                countdownOverlay.classList.remove('hidden');
                countdownOverlay.classList.add('active');
                startCountdown(10);
            }, 2500);

            function startCountdown(seconds) {
                let remaining = seconds;
                countdownNumber.textContent = remaining;

                const interval = setInterval(() => {
                    remaining--;
                    if (remaining >= 0) {
                        countdownNumber.textContent = remaining;
                    }
                    if (remaining <= 0) {
                        clearInterval(interval);
                        // 倒计时结束，切换到故障动画
                        countdownOverlay.classList.remove('active');
                        countdownOverlay.classList.add('hidden');

                        // 显示故障层
                        glitchOverlay.classList.remove('hidden');
                        glitchOverlay.classList.add('active');
                        glitchBg.classList.remove('hidden');
                        glitchBg.classList.add('active');

                        // 故障持续1.8秒后切换到主界面
                        setTimeout(() => {
                            glitchOverlay.classList.remove('active');
                            glitchOverlay.classList.add('hidden');
                            glitchBg.classList.remove('active');
                            glitchBg.classList.add('hidden');

                            // 显示最终等待界面
                            mainOverlay.classList.remove('hidden');
                            mainOverlay.classList.add('active');
                        }, 1800);
                    }
                }, 1000);
            }
        })();
    </script>
</body>
</html>
