<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARG - 等待指示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 细微扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 微弱的噪点纹理 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 40px 24px;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .line {
            font-size: 1.25rem;
            letter-spacing: 0.12em;
            line-height: 2;
            font-weight: 400;
            color: #f0f0f0;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
        }

        .line.cn {
            font-size: 1.35rem;
            letter-spacing: 0.15em;
        }

        .line.en {
            font-size: 1rem;
            letter-spacing: 0.1em;
            color: #cccccc;
            margin-top: 2px;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.25);
            margin: 16px auto;
            border: none;
        }

        /* 闪烁光标 */
        .cursor {
            display: inline-block;
            width: 1px;
            height: 1.1em;
            background: #ffffff;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* 底部微小标记 */
        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.3;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: #888888;
            animation: fadeIn 3s ease-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="line cn">欢迎来到此地。<span class="cursor"></span></p>
        <hr class="divider">
        <p class="line en">Welcome to this place.</p>
        <p class="line en" style="margin-top:6px;">Please wait for instructions.</p>
        <p class="line cn" style="margin-top:4px;">请等待指示。</p>
    </div>

    <div class="sigil">◆</div>

</body>
</html>
