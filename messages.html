<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - ARG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            min-height: 100vh;
            padding: 40px 0 60px 10vw;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            position: relative;
            overflow-x: hidden;
        }

        /* 扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 噪点 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* 主内容容器 */
        .container {
            width: 70%;
            max-width: 680px;
            position: relative;
            z-index: 1;
            margin: 0;
        }

        .back-link {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            opacity: 0.6;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #cccccc;
            opacity: 1;
        }
        .back-link::before {
            content: '← ';
        }

        /* 最终标题区域 */
        .page-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
            opacity: 0;
            width: 100%;
        }
        .page-header .cn-title {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            font-weight: 400;
            color: #f0f0f0;
        }
        .page-header .en-title {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #777777;
        }

        /* 淡入内容包裹 */
        .fade-content {
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .fade-content.visible {
            opacity: 1;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-item {
            display: flex;
            align-items: baseline;
            gap: 18px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
            cursor: pointer;
            color: #cccccc;
            text-decoration: none;
            position: relative;
        }
        .message-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .message-item .date {
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            color: #666666;
            white-space: nowrap;
            min-width: 90px;
            font-family: "Courier New", "Fira Code", monospace;
        }
        .message-item .title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #dddddd;
            transition: color 0.2s;
        }
        .message-item:hover .title {
            color: #ffffff;
        }
        .message-item .arrow {
            margin-left: auto;
            color: #555555;
            font-size: 0.8rem;
            transition: color 0.2s, transform 0.2s;
        }
        .message-item:hover .arrow {
            color: #aaaaaa;
            transform: translateX(3px);
        }
        .message-item::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }
        .message-item:hover::before {
            background: rgba(255, 255, 255, 0.3);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555555;
            letter-spacing: 0.1em;
            text-align: left;
            opacity: 0.5;
        }

        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.25;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #888888;
        }

        /* 开屏动画元素 */
        .anim-text {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            filter: blur(12px);
            animation: revealText 1.2s ease forwards;
            transition: transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0);
            white-space: nowrap;
            font-weight: 400;
        }
        .anim-cn {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            color: #f0f0f0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .anim-en {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #888;
            top: calc(50% + 2.8rem);
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes revealText {
            0% {
                opacity: 0;
                filter: blur(12px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
            }
        }
    </style>
</head>
<body>

    <!-- 开屏动画文字 -->
    <div id="animCN" class="anim-text anim-cn">消息</div>
    <div id="animEN" class="anim-text anim-en">Messages</div>

    <!-- 主内容区域 -->
    <div class="container">
        <div class="fade-content" id="fadeWrap">
            <a href="index.html" class="back-link">返回</a>
        </div>

        <div class="page-header" id="pageHeader">
            <span class="cn-title" id="cnTarget">消息</span>
            <span class="en-title" id="enTarget">Messages</span>
        </div>

        <div class="fade-content" id="fadeWrap2">
            <div class="message-list">
                <a href="#" class="message-item">
                    <span class="date">2026.05.24</span>
                    <span class="title">STAAAAART...</span>
                    <span class="arrow">→</span>
                </a>
            </div>
            <div class="footer-note">[ 共 1 条记录 · 持续监控中 ]</div>
        </div>
    </div>

    <div class="sigil">◆</div>

    <script>
        (function() {
            const animCN = document.getElementById('animCN');
            const animEN = document.getElementById('animEN');
            const cnTarget = document.getElementById('cnTarget');
            const enTarget = document.getElementById('enTarget');
            const pageHeader = document.getElementById('pageHeader');
            const fadeWrap = document.getElementById('fadeWrap');
            const fadeWrap2 = document.getElementById('fadeWrap2');

            let animationCount = 0;
            const totalAnims = 2;
            let moved = false;

            function onRevealEnd() {
                animationCount++;
                if (animationCount === totalAnims && !moved) {
                    startMove();
                }
            }

            animCN.addEventListener('animationend', function(e) {
                if (e.animationName === 'revealText') onRevealEnd();
            });
            animEN.addEventListener('animationend', function(e) {
                if (e.animationName === 'revealText') onRevealEnd();
            });

            function getCenter(el) {
                const rect = el.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }

            function startMove() {
                moved = true;

                // 获取目标元素中心坐标
                const cnTargetCenter = getCenter(cnTarget);
                const enTargetCenter = getCenter(enTarget);

                // 获取当前动画元素中心坐标
                const cnAnimCenter = getCenter(animCN);
                const enAnimCenter = getCenter(animEN);

                // 计算需要移动的偏移量
                const deltaCNX = cnTargetCenter.x - cnAnimCenter.x;
                const deltaCNY = cnTargetCenter.y - cnAnimCenter.y;
                const deltaENX = enTargetCenter.x - enAnimCenter.x;
                const deltaENY = enTargetCenter.y - enAnimCenter.y;

                // 清除动画，固定当前状态
                [animCN, animEN].forEach(el => {
                    el.style.animation = 'none';
                    el.style.opacity = '1';
                    el.style.filter = 'blur(0)';
                    el.offsetHeight;
                });

                // 设置过渡并移动到目标位置
                animCN.style.transition = 'transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0)';
                animCN.style.transform = `translate(calc(-50% + ${deltaCNX}px), calc(-50% + ${deltaCNY}px))`;

                animEN.style.transition = 'transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0)';
                animEN.style.transform = `translate(calc(-50% + ${deltaENX}px), calc(-50% + ${deltaENY}px))`;

                // 移动结束后处理
                animEN.addEventListener('transitionend', function handler() {
                    animEN.removeEventListener('transitionend', handler);

                    animCN.remove();
                    animEN.remove();

                    pageHeader.style.opacity = '1';

                    fadeWrap.classList.add('visible');
                    fadeWrap2.classList.add('visible');
                });
            }
        })();
    </script>
</body>
</html>
