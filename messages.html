<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - ARG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            min-height: 100vh;
            padding: 40px 28px 60px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            position: relative;
            overflow-x: hidden;
        }

        /* 扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 噪点 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* 主内容容器，初始透明 */
        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .container.visible {
            opacity: 1;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            transition: color 0.2s;
            opacity: 0.6;
        }
        .back-link:hover {
            color: #cccccc;
            opacity: 1;
        }
        .back-link::before {
            content: '← ';
        }

        /* 页面标题区域 - 初始完全透明，占位但不显示 */
        .page-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .page-header.reveal {
            opacity: 1;
        }
        .page-header .cn-title {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            font-weight: 400;
            color: #f0f0f0;
        }
        .page-header .en-title {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #777777;
        }

        /* 消息列表 */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-item {
            display: flex;
            align-items: baseline;
            gap: 18px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
            cursor: pointer;
            color: #cccccc;
            text-decoration: none;
            position: relative;
        }
        .message-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .message-item .date {
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            color: #666666;
            white-space: nowrap;
            min-width: 90px;
            font-family: "Courier New", "Fira Code", monospace;
        }
        .message-item .title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #dddddd;
            transition: color 0.2s;
        }
        .message-item:hover .title {
            color: #ffffff;
        }
        .message-item .arrow {
            margin-left: auto;
            color: #555555;
            font-size: 0.8rem;
            transition: color 0.2s, transform 0.2s;
        }
        .message-item:hover .arrow {
            color: #aaaaaa;
            transform: translateX(3px);
        }

        .message-item::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }
        .message-item:hover::before {
            background: rgba(255, 255, 255, 0.3);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555555;
            letter-spacing: 0.1em;
            text-align: center;
            opacity: 0.5;
        }

        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.25;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #888888;
        }

        /* ---------- 入场动画层 ---------- */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }
        .intro-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            filter: blur(12px);
            /* 模糊显现动画 */
            animation: revealText 1.2s ease forwards;
            /* 后续移动由JS控制，通过添加transition */
            transition: transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0);
        }
        .intro-text .cn {
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            color: #f0f0f0;
        }
        .intro-text .en {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #888;
        }

        @keyframes revealText {
            0% {
                opacity: 0;
                filter: blur(12px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
            }
        }
    </style>
</head>
<body>

    <!-- 入场动画文字（将滑动到标题位置） -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-text" id="introText">
            <span class="cn">消息</span>
            <span class="en">Messages</span>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="container" id="mainContainer">
        <a href="index.html" class="back-link">返回</a>

        <!-- 标题初始透明，占位 -->
        <div class="page-header" id="pageHeader">
            <span class="cn-title">消息</span>
            <span class="en-title">Messages</span>
        </div>

        <div class="message-list">
            <a href="#" class="message-item">
                <span class="date">2026.05.24</span>
                <span class="title">STAAAAART...</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer-note">[ 共 1 条记录 · 持续监控中 ]</div>
    </div>

    <div class="sigil">◆</div>

    <script>
        (function() {
            const introText = document.getElementById('introText');
            const pageHeader = document.getElementById('pageHeader');
            const mainContainer = document.getElementById('mainContainer');
            const introOverlay = document.getElementById('introOverlay');

            // 等待模糊显现动画结束（1.2s）
            introText.addEventListener('animationend', function(e) {
                if (e.animationName === 'revealText') {
                    // 获取标题中“消息”中文部分的实际位置（取cn-title元素）
                    const cnTitle = pageHeader.querySelector('.cn-title');
                    const targetRect = cnTitle.getBoundingClientRect();

                    // 计算目标位置相对于视口中心的偏移量
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    const targetX = targetRect.left + targetRect.width / 2;
                    const targetY = targetRect.top + targetRect.height / 2;
                    const deltaX = targetX - centerX;
                    const deltaY = targetY - centerY;

                    // 设置移动的目标transform（覆盖之前的translate(-50%,-50%)）
                    // 需要先移除原有的动画transform，再设置新值
                    introText.style.animation = 'none'; // 停止模糊动画
                    introText.style.opacity = '1';
                    introText.style.filter = 'blur(0)';
                    // 重新设置初始位置为当前中心，以便transition生效
                    introText.style.transform = 'translate(-50%, -50%)';

                    // 强制回流
                    introText.offsetHeight;

                    // 添加过渡并移动到目标位置
                    introText.style.transition = 'transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0)';
                    introText.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;

                    // 移动结束后：隐藏动画文字，显示真实标题，并淡入其他内容
                    introText.addEventListener('transitionend', function handler() {
                        introText.removeEventListener('transitionend', handler);
                        // 隐藏动画覆盖层
                        introOverlay.style.display = 'none';
                        // 瞬间显示真实标题（无动画）
                        pageHeader.classList.add('reveal');
                        // 缓慢淡入其余内容
                        mainContainer.classList.add('visible');
                    });
                }
            });
        })();
    </script>
</body>
</html>
