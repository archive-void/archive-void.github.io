<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - ARG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            min-height: 100vh;
            padding: 40px 28px 60px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            position: relative;
            overflow-x: hidden;
        }

        /* 扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 噪点 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* 主内容容器，初始透明 */
        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .container.visible {
            opacity: 1;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            transition: color 0.2s;
            opacity: 0.6;
        }
        .back-link:hover {
            color: #cccccc;
            opacity: 1;
        }
        .back-link::before {
            content: '← ';
        }

        /* 页面标题区域 */
        .page-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
        }
        .page-header .cn-title {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            font-weight: 400;
            color: #f0f0f0;
        }
        .page-header .en-title {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #777777;
        }

        /* 消息列表 */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-item {
            display: flex;
            align-items: baseline;
            gap: 18px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
            cursor: pointer;
            color: #cccccc;
            text-decoration: none;
            position: relative;
        }
        .message-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .message-item .date {
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            color: #666666;
            white-space: nowrap;
            min-width: 90px;
            font-family: "Courier New", "Fira Code", monospace;
        }
        .message-item .title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #dddddd;
            transition: color 0.2s;
        }
        .message-item:hover .title {
            color: #ffffff;
        }
        .message-item .arrow {
            margin-left: auto;
            color: #555555;
            font-size: 0.8rem;
            transition: color 0.2s, transform 0.2s;
        }
        .message-item:hover .arrow {
            color: #aaaaaa;
            transform: translateX(3px);
        }

        .message-item::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }
        .message-item:hover::before {
            background: rgba(255, 255, 255, 0.3);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555555;
            letter-spacing: 0.1em;
            text-align: center;
            opacity: 0.5;
        }

        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.25;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #888888;
        }

        /* ---------- 入场动画 ---------- */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }
        .intro-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            filter: blur(12px);
            /* 先模糊显现，再滑动到最终位置 */
            animation: revealText 1.2s ease forwards,
                       moveToCorner 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0) 1.2s forwards;
        }
        .intro-text .cn {
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            color: #f0f0f0;
        }
        .intro-text .en {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #888;
        }

        @keyframes revealText {
            0% {
                opacity: 0;
                filter: blur(12px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
            }
        }
        @keyframes moveToCorner {
            0% {
                transform: translate(0, 0);
            }
            100% {
                /* 位移量：距离左上角 (40px, 40px) 的偏移，与.page-header位置对齐 */
                transform: translate(
                    calc(-50vw + 40px + 14px),
                    calc(-50vh + 40px + 14px)
                );
            }
        }
    </style>
</head>
<body>

    <!-- 动画覆盖层：标题先居中模糊出现，再滑动到左上角 -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-text" id="introText">
            <span class="cn">消息</span>
            <span class="en">Messages</span>
        </div>
    </div>

    <!-- 主内容区域，动画结束后显示 -->
    <div class="container" id="mainContainer">
        <a href="index.html" class="back-link">返回</a>

        <div class="page-header">
            <span class="cn-title">消息</span>
            <span class="en-title">Messages</span>
        </div>

        <div class="message-list">
            <a href="#" class="message-item">
                <span class="date">2026.05.24</span>
                <span class="title">STAAAAART...</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer-note">[ 共 1 条记录 · 持续监控中 ]</div>
    </div>

    <div class="sigil">◆</div>

    <script>
        const overlay = document.getElementById('introOverlay');
        const mainContainer = document.getElementById('mainContainer');
        const introText = document.getElementById('introText');

        // 当 moveToCorner 动画结束时，隐藏覆盖层并显示主内容
        introText.addEventListener('animationend', function(e) {
            // 检查是否是 moveToCorner 动画结束（animationName）
            if (e.animationName === 'moveToCorner') {
                overlay.style.display = 'none';
                mainContainer.classList.add('visible');
            }
        });
    </script>
</body>
</html>
