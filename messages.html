<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - ARG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            min-height: 100vh;
            padding: 40px 28px 60px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            position: relative;
            overflow-x: hidden;
        }

        /* 扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 噪点 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        /* 主内容容器，初始透明 */
        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .container.visible {
            opacity: 1;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            transition: color 0.2s;
            opacity: 0.6;
        }
        .back-link:hover {
            color: #cccccc;
            opacity: 1;
        }
        .back-link::before {
            content: '← ';
        }

        /* 页面标题区域（仅用于定位参考，实际不可见） */
        .page-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
            visibility: hidden; /* 占位但不可见，用于获取坐标 */
            pointer-events: none;
        }
        .page-header .cn-title {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            font-weight: 400;
            color: #f0f0f0;
        }
        .page-header .en-title {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #777777;
        }

        /* 消息列表 */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-item {
            display: flex;
            align-items: baseline;
            gap: 18px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
            cursor: pointer;
            color: #cccccc;
            text-decoration: none;
            position: relative;
        }
        .message-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .message-item .date {
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            color: #666666;
            white-space: nowrap;
            min-width: 90px;
            font-family: "Courier New", "Fira Code", monospace;
        }
        .message-item .title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #dddddd;
            transition: color 0.2s;
        }
        .message-item:hover .title {
            color: #ffffff;
        }
        .message-item .arrow {
            margin-left: auto;
            color: #555555;
            font-size: 0.8rem;
            transition: color 0.2s, transform 0.2s;
        }
        .message-item:hover .arrow {
            color: #aaaaaa;
            transform: translateX(3px);
        }

        .message-item::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }
        .message-item:hover::before {
            background: rgba(255, 255, 255, 0.3);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555555;
            letter-spacing: 0.1em;
            text-align: center;
            opacity: 0.5;
        }

        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.25;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #888888;
        }

        /* ---------- 入场动画元素 ---------- */
        .anim-text {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            filter: blur(12px);
            /* 模糊显现动画 */
            animation: revealText 1.2s ease forwards;
            /* 后续移动由JS设置transition */
            transition: transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0);
            white-space: nowrap;
        }
        .anim-cn {
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            color: #f0f0f0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .anim-en {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #888;
            top: calc(50% + 2.5rem); /* 中文下方，模拟纵排列 */
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes revealText {
            0% {
                opacity: 0;
                filter: blur(12px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
            }
        }
    </style>
</head>
<body>

    <!-- 动画元素：中文 -->
    <div id="animCN" class="anim-text anim-cn">消息</div>
    <!-- 动画元素：英文 -->
    <div id="animEN" class="anim-text anim-en">Messages</div>

    <!-- 主内容区域 -->
    <div class="container" id="mainContainer">
        <a href="index.html" class="back-link">返回</a>

        <!-- 隐藏的标题区域，仅用于坐标参考 -->
        <div class="page-header" id="pageHeader">
            <span class="cn-title" id="cnTarget">消息</span>
            <span class="en-title" id="enTarget">Messages</span>
        </div>

        <div class="message-list">
            <a href="#" class="message-item">
                <span class="date">2026.05.24</span>
                <span class="title">STAAAAART...</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer-note">[ 共 1 条记录 · 持续监控中 ]</div>
    </div>

    <div class="sigil">◆</div>

    <script>
        (function() {
            const animCN = document.getElementById('animCN');
            const animEN = document.getElementById('animEN');
            const cnTarget = document.getElementById('cnTarget');
            const enTarget = document.getElementById('enTarget');
            const mainContainer = document.getElementById('mainContainer');

            // 等待模糊显现动画结束（1.2s）
            animCN.addEventListener('animationend', function(e) {
                if (e.animationName === 'revealText') {
                    // 确保两个动画都结束后再移动（英文可能稍晚？同时开始，同时结束）
                    // 简单起见，我们检查英文是否也已结束，或者直接开始移动
                    // 这里设定：中文动画结束后开始计算并移动两个元素
                    startMove();
                }
            });
            // 为防止英文动画先结束，也监听
            animEN.addEventListener('animationend', function(e) {
                if (e.animationName === 'revealText') {
                    // 如果中文已经结束，则移动
                    if (animCN.style.animationPlayState !== 'running') {
                        startMove();
                    }
                }
            });

            let moved = false;
            function startMove() {
                if (moved) return;
                moved = true;

                // 获取目标元素的位置（基于视口）
                const cnRect = cnTarget.getBoundingClientRect();
                const enRect = enTarget.getBoundingClientRect();

                // 计算中文目标中心坐标
                const cnTargetX = cnRect.left + cnRect.width / 2;
                const cnTargetY = cnRect.top + cnRect.height / 2;
                // 英文目标中心
                const enTargetX = enRect.left + enRect.width / 2;
                const enTargetY = enRect.top + enRect.height / 2;

                // 当前动画元素位置：初始设置在 center，通过 transform: translate(-50%,-50%)
                // 因此要移动到目标中心，需要计算相对于视口中心的偏移量
                const viewportCenterX = window.innerWidth / 2;
                const viewportCenterY = window.innerHeight / 2;

                // 中文需要移动的偏移量
                const deltaCNX = cnTargetX - viewportCenterX;
                const deltaCNY = cnTargetY - viewportCenterY;
                // 英文需要移动的偏移量
                const deltaENX = enTargetX - viewportCenterX;
                const deltaENY = enTargetY - viewportCenterY;

                // 清除动画，设置当前状态，然后应用transition移动
                [animCN, animEN].forEach(el => {
                    el.style.animation = 'none';
                    el.style.opacity = '1';
                    el.style.filter = 'blur(0)';
                    // 强制回流
                    el.offsetHeight;
                });

                // 设置transition并移动到目标位置
                animCN.style.transition = 'transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0)';
                animCN.style.transform = `translate(calc(-50% + ${deltaCNX}px), calc(-50% + ${deltaCNY}px))`;

                animEN.style.transition = 'transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0)';
                animEN.style.transform = `translate(calc(-50% + ${deltaENX}px), calc(-50% + ${deltaENY}px))`;

                // 监听英文移动结束（两者同时结束，只监听一个即可）
                animEN.addEventListener('transitionend', function handler() {
                    animEN.removeEventListener('transitionend', handler);
                    // 移动结束，将动画元素转为静态定位（固定在最终位置）
                    // 方法：移除transition，直接设置left/top为当前计算出的位置，或者保持fixed但不再变化
                    // 为了后续页面滚动不影响，可改为absolute？页面不需要滚动，保持fixed即可。
                    // 同时让其余内容淡入
                    mainContainer.classList.add('visible');

                    // 可选：将动画元素样式固定，防止窗口大小变化时错位（简化处理，保持fixed）
                    // 不再需要隐藏任何元素，动画文字永久保留。
                });
            }
        })();
    </script>
</body>
</html>
