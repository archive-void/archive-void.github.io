<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - ARG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            min-height: 100vh;
            padding: 40px 28px 60px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            position: relative;
            overflow-x: hidden;
        }

        /* 扫描线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        /* 噪点 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            transition: color 0.2s;
            opacity: 0.6;
        }
        .back-link:hover {
            color: #cccccc;
            opacity: 1;
        }
        .back-link::before {
            content: '← ';
        }

        /* 页面标题区域 */
        .page-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
        }
        .page-header .cn-title {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            font-weight: 400;
            color: #f0f0f0;
        }
        .page-header .en-title {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #777777;
        }

        /* 消息列表 */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-item {
            display: flex;
            align-items: baseline;
            gap: 18px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
            cursor: pointer;
            color: #cccccc;
            text-decoration: none;
            position: relative;
        }
        .message-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .message-item .date {
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            color: #666666;
            white-space: nowrap;
            min-width: 90px;
            font-family: "Courier New", "Fira Code", monospace;
        }
        .message-item .title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #dddddd;
            transition: color 0.2s;
        }
        .message-item:hover .title {
            color: #ffffff;
        }
        .message-item .arrow {
            margin-left: auto;
            color: #555555;
            font-size: 0.8rem;
            transition: color 0.2s, transform 0.2s;
        }
        .message-item:hover .arrow {
            color: #aaaaaa;
            transform: translateX(3px);
        }

        /* 装饰性元素：左侧小标记 */
        .message-item::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }
        .message-item:hover::before {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 底部标记 */
        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555555;
            letter-spacing: 0.1em;
            text-align: center;
            opacity: 0.5;
        }

        /* 隐秘符号 */
        .sigil {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.25;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 返回首页链接 -->
        <a href="index.html" class="back-link">返回</a>

        <!-- 页面标题 -->
        <div class="page-header">
            <span class="cn-title">消息</span>
            <span class="en-title">Messages</span>
        </div>

        <!-- 消息列表 -->
        <div class="message-list">
            <a href="#" class="message-item">
                <span class="date">2025.07.12</span>
                <span class="title">初始信号捕获报告</span>
                <span class="arrow">→</span>
            </a>
            <a href="#" class="message-item">
                <span class="date">2025.08.03</span>
                <span class="title">频段干扰与异常模式</span>
                <span class="arrow">→</span>
            </a>
            <a href="#" class="message-item">
                <span class="date">2025.09.18</span>
                <span class="title">坐标交叉验证结果</span>
                <span class="arrow">→</span>
            </a>
            <a href="#" class="message-item">
                <span class="date">2025.10.01</span>
                <span class="title">████ 协议启动</span>
                <span class="arrow">→</span>
            </a>
            <a href="#" class="message-item">
                <span class="date">2025.11.07</span>
                <span class="title">未知发送者身份推测</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer-note">[ 共 5 条记录 · 持续监控中 ]</div>
    </div>

    <div class="sigil">◆</div>

</body>
</html>
