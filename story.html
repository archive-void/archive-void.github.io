<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事 - Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Courier New", "Fira Code", "SF Mono", "Menlo", "PingFang SC", "Microsoft YaHei", monospace;
            min-height: 100vh;
            padding: 20px 0 40px;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 20px;
            z-index: 50;
            color: #888888;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .back-link:hover {
            color: #cccccc;
            opacity: 1;
        }
        .back-link::before {
            content: '← ';
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .final-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            opacity: 0;
        }
        .final-title .cn {
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            color: #f0f0f0;
        }
        .final-title .en {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #888;
        }

        .fade-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .fade-content.visible {
            opacity: 1;
        }

        .top-line {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 28px;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.8s cubic-bezier(0.42, 0.0, 0.58, 1.0);
        }
        .top-line.expand {
            transform: scaleX(1);
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 98%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 卡片样式增强 */
        .archive-card {
            position: relative;
            aspect-ratio: 4 / 3;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease, box-shadow 0.35s ease;
            /* 增强的立体阴影：深色投影 + 轻微内高光 */
            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.8),
                0 3px 8px rgba(0, 0, 0, 0.6),
                inset 0 1px 2px rgba(255, 255, 255, 0.06),
                inset 0 -1px 2px rgba(0, 0, 0, 0.3);
        }

        .card-normal:hover {
            transform: translateY(-6px);
            box-shadow:
                0 0 30px rgba(255, 255, 255, 0.5),
                0 0 60px rgba(255, 255, 255, 0.2),
                0 14px 35px rgba(0, 0, 0, 0.8),
                0 5px 12px rgba(0, 0, 0, 0.6),
                inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        .card-corrupted:hover {
            transform: translateY(-4px);
            box-shadow:
                0 12px 28px rgba(255, 0, 0, 0.25),
                0 4px 12px rgba(0, 0, 0, 0.8),
                0 2px 5px rgba(0, 0, 0, 0.6),
                inset 0 1px 2px rgba(255, 255, 255, 0.04);
        }

        /* 背景渐变：从左上到右下，强对比，营造灯光感 */
        .card-bg {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            transition: filter 0.35s ease, brightness 0.35s ease;
            /* 默认添加内发光叠加层 */
        }

        .card-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            /* 叠加柔光层 */
            background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        /* 12级连续灰度渐变：从左上到右下（to bottom right） */
        .card-1  .card-bg { background: linear-gradient(to bottom right, #e6e6e6 0%, #cccccc 30%, #aaaaaa 100%); }
        .card-2  .card-bg { background: linear-gradient(to bottom right, #d4d4d4 0%, #b8b8b8 30%, #969696 100%); }
        .card-3  .card-bg { background: linear-gradient(to bottom right, #c2c2c2 0%, #a6a6a6 30%, #848484 100%); }
        .card-4  .card-bg { background: linear-gradient(to bottom right, #b0b0b0 0%, #949494 30%, #727272 100%); }
        .card-5  .card-bg { background: linear-gradient(to bottom right, #9e9e9e 0%, #828282 30%, #606060 100%); }
        .card-6  .card-bg { background: linear-gradient(to bottom right, #8c8c8c 0%, #707070 30%, #4e4e4e 100%); }
        .card-7  .card-bg { background: linear-gradient(to bottom right, #7a7a7a 0%, #5e5e5e 30%, #3c3c3c 100%); }
        .card-8  .card-bg { background: linear-gradient(to bottom right, #686868 0%, #4c4c4c 30%, #2a2a2a 100%); }
        .card-9  .card-bg { background: linear-gradient(to bottom right, #565656 0%, #3a3a3a 30%, #1a1a1a 100%); }
        .card-10 .card-bg { background: linear-gradient(to bottom right, #444444 0%, #2a2a2a 30%, #0e0e0e 100%); }
        .card-11 .card-bg { background: linear-gradient(to bottom right, #323232 0%, #1a1a1a 30%, #050505 100%); }
        .card-12 .card-bg { background: linear-gradient(to bottom right, #202020 0%, #0c0c0c 30%, #000000 100%); }

        .card-normal:hover .card-bg {
            filter: brightness(1.25);
        }
        .card-corrupted .card-bg {
            filter: brightness(0.65);
        }
        .card-corrupted:hover .card-bg {
            filter: brightness(0.32);
        }

        .particle-layer {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            pointer-events: none;
            z-index: 3;
        }
        .particle {
            position: absolute;
            background: rgba(155, 26, 26, 0.6);
            opacity: 0;
            transition: none;
        }
        .particle.visible {
            animation: particlePulse var(--dur) ease-in-out var(--del) infinite;
        }

        @keyframes particlePulse {
            0%, 100% { opacity: 0.15; }
            22% { opacity: 0.8; }
            38% { opacity: 0.2; }
            55% { opacity: 0.9; }
            70% { opacity: 0.25; }
            85% { opacity: 0.65; }
        }

        .card-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 72%;
            height: 24%;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            letter-spacing: 0.1em;
            transition: transform 0.25s ease, box-shadow 0.25s ease, text-shadow 0.25s ease;
            z-index: 5;
            pointer-events: none;
            white-space: nowrap;
        }
        .card-normal .card-label {
            background: rgba(255, 255, 255, 0.94);
            color: #000000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            font-family: "Courier New", "Fira Code", monospace;
            font-size: 1.3rem;
        }
        .card-normal:hover .card-label {
            background: #ffffff;
            transform: translate(-50%, -50%) scale(1.04);
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.6), 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        /* 尖锐字体：使用 Menlo, Consolas 等硬朗等宽字体 */
        .card-corrupted .card-label {
            background: rgba(135, 22, 22, 0.88);
            color: #e6e6e6;
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.5);
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
            font-size: 1.25rem;
            font-family: "Menlo", "Consolas", "SF Mono", "Courier New", monospace;
            font-weight: 700;
            letter-spacing: 0.2em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .card-corrupted:hover .card-label {
            transform: translate(-50%, -50%) scale(1.12);
            text-shadow: 0 0 18px rgba(255, 45, 45, 0.9), 0 0 34px rgba(255, 0, 0, 0.55);
            box-shadow: 0 0 22px rgba(255, 0, 0, 0.5), 0 0 8px rgba(255, 0, 0, 0.3);
        }

        /* 开场动画保持不变 */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anim-wrapper {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .anim-wrapper svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 24px);
            height: calc(100% + 16px);
            pointer-events: none;
        }
        .draw-rect {
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawLine 1.8s cubic-bezier(0.42, 0.0, 0.58, 1.0) forwards;
        }
        @keyframes drawLine {
            0% { stroke-dashoffset: 2000; }
            100% { stroke-dashoffset: 0; }
        }
        .anim-text {
            opacity: 0;
            filter: blur(12px);
            animation: revealText 1.2s ease forwards;
        }
        .anim-cn {
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            color: #f0f0f0;
        }
        .anim-en {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #888;
        }
        @keyframes revealText {
            0% { opacity: 0; filter: blur(12px); }
            100% { opacity: 1; filter: blur(0); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">返回</a>

    <div class="intro-overlay" id="introOverlay">
        <div class="anim-wrapper" id="animWrapper">
            <svg id="rectSvg" viewBox="0 0 200 100" preserveAspectRatio="none">
                <path id="rectPath" d="M 100 0 L 200 0 L 200 100 L 0 100 L 0 0 L 100 0"
                class="draw-rect" />
            </svg>
            <div class="anim-text anim-cn">故事</div>
            <div class="anim-text anim-en">Story</div>
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="final-title" id="finalTitle">
            <span class="cn">故事</span>
            <span class="en">Story</span>
        </div>

        <div class="fade-content" id="fadeContent">
            <div class="top-line" id="topLine"></div>
            <div class="archive-grid" id="archiveGrid">
                <div class="archive-card card-normal card-1">
                    <div class="card-bg"></div>
                    <div class="card-label">111</div>
                </div>
                <div class="archive-card card-corrupted card-2" data-card="2">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-3" data-card="3">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-4" data-card="4">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-5" data-card="5">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-6" data-card="6">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-7" data-card="7">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-8" data-card="8">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-9" data-card="9">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-10" data-card="10">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-11" data-card="11">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
                <div class="archive-card card-corrupted card-12" data-card="12">
                    <div class="card-bg"></div>
                    <div class="particle-layer"></div>
                    <div class="card-label">Unrecorded</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 开场动画 ==========
            const animWrapper = document.getElementById('animWrapper');
            const introOverlay = document.getElementById('introOverlay');
            const finalTitle = document.getElementById('finalTitle');
            const fadeContent = document.getElementById('fadeContent');
            const topLine = document.getElementById('topLine');
            const rectSvg = document.getElementById('rectSvg');
            const rectPath = document.getElementById('rectPath');

            let drawFinished = false;
            let revealFinished = false;

            rectPath.addEventListener('animationend', function(e) {
                if (e.animationName === 'drawLine') {
                    drawFinished = true;
                    rectSvg.style.transition = 'opacity 0.4s ease';
                    rectSvg.style.opacity = '0';
                    checkBoth();
                }
            });

            const animTexts = document.querySelectorAll('.anim-text');
            animTexts.forEach(el => {
                el.addEventListener('animationend', function(e) {
                    if (e.animationName === 'revealText') {
                        revealFinished = true;
                        checkBoth();
                    }
                });
            });

            function checkBoth() {
                if (drawFinished && revealFinished) {
                    setTimeout(moveTitleToTop, 500);
                }
            }

            function moveTitleToTop() {
                const wrapperRect = animWrapper.getBoundingClientRect();
                const currentCenterX = wrapperRect.left + wrapperRect.width / 2;
                const currentCenterY = wrapperRect.top + wrapperRect.height / 2;
                const targetRect = finalTitle.getBoundingClientRect();
                const targetCenterX = targetRect.left + targetRect.width / 2;
                const targetCenterY = targetRect.top + targetRect.height / 2;
                const deltaX = targetCenterX - currentCenterX;
                const deltaY = targetCenterY - currentCenterY;

                animWrapper.style.transition = 'transform 1.2s cubic-bezier(0.42, 0.0, 0.58, 1.0)';
                animWrapper.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                animWrapper.addEventListener('transitionend', function handler() {
                    animWrapper.removeEventListener('transitionend', handler);
                    setTimeout(() => {
                        introOverlay.style.display = 'none';
                        finalTitle.style.opacity = '1';
                        fadeContent.classList.add('visible');
                        setTimeout(() => { topLine.classList.add('expand'); }, 100);
                    }, 600);
                });
            }

            // ========== 粒子系统 ==========
            const corruptedCards = document.querySelectorAll('.card-corrupted');
            const TOTAL_PARTICLES = 15;
            const AMBIENT_COUNT = 4;
            const SLOW_INTERVAL = 800;
            const FAST_INTERVAL = 180;

            const cardParticleData = new Map();

            corruptedCards.forEach(card => {
                const layer = card.querySelector('.particle-layer');
                const particles = [];

                for (let i = 0; i < TOTAL_PARTICLES; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');

                    const w = 2 + Math.random() * 6;
                    const h = 2 + Math.random() * 6;
                    const shapeType = Math.floor(Math.random() * 4);
                    let borderRadius = '';
                    let clipPath = '';
                    switch (shapeType) {
                        case 0:
                            borderRadius = '50%';
                            break;
                        case 1:
                            borderRadius = (30 + Math.random() * 40) + '% / ' + (20 + Math.random() * 30) + '%';
                            break;
                        case 2:
                            borderRadius = (10 + Math.random() * 50) + '% ' + (10 + Math.random() * 50) + '% ' + (10 +
                                Math.random() * 50) + '% ' + (10 + Math.random() * 50) + '%';
                            break;
                        case 3:
                            const pts = [];
                            const n = 3 + Math.floor(Math.random() * 3);
                            for (let j = 0; j < n; j++) {
                                pts.push((20 + Math.random() * 60) + '% ' + (20 + Math.random() * 60) + '%');
                            }
                            clipPath = 'polygon(' + pts.join(', ') + ')';
                            break;
                    }
                    const duration = 2.2 + Math.random() * 3.5;
                    const delay = Math.random() * 4;
                    const left = 3 + Math.random() * 90;
                    const top = 3 + Math.random() * 90;

                    particle.style.cssText = `
                        left: ${left}%;
                        top: ${top}%;
                        width: ${w}px;
                        height: ${h}px;
                        border-radius: ${borderRadius};
                        clip-path: ${clipPath};
                        --dur: ${duration}s;
                        --del: ${delay}s;
                    `;
                    layer.appendChild(particle);
                    particles.push({ el: particle, duration, delay });
                }

                cardParticleData.set(card, {
                    particles,
                    isHovered: false,
                    ambientSet: new Set(),
                    lastUpdate: 0,
                });

                refreshAmbient(card);

                card.addEventListener('mouseenter', () => {
                    const data = cardParticleData.get(card);
                    data.isHovered = true;
                    data.particles.forEach(p => {
                        p.el.classList.add('visible');
                        p.el.style.setProperty('--dur', (0.08 + Math.random() * 0.2) + 's');
                    });
                });
                card.addEventListener('mouseleave', () => {
                    const data = cardParticleData.get(card);
                    data.isHovered = false;
                    data.particles.forEach(p => {
                        p.el.style.setProperty('--dur', p.duration + 's');
                    });
                    refreshAmbient(card);
                });
            });

            function refreshAmbient(card) {
                const data = cardParticleData.get(card);
                if (!data || data.isHovered) return;
                data.ambientSet.forEach(i => {
                    data.particles[i].el.classList.remove('visible');
                });
                data.ambientSet.clear();
                const indices = [];
                while (indices.length < AMBIENT_COUNT) {
                    const r = Math.floor(Math.random() * TOTAL_PARTICLES);
                    if (!indices.includes(r)) indices.push(r);
                }
                indices.forEach(i => {
                    data.particles[i].el.classList.add('visible');
                    data.ambientSet.add(i);
                });
                indices.forEach(i => {
                    const p = data.particles[i];
                    p.el.style.left = (3 + Math.random() * 90) + '%';
                    p.el.style.top = (3 + Math.random() * 90) + '%';
                });
            }

            function updateAllParticles(timestamp) {
                corruptedCards.forEach(card => {
                    const data = cardParticleData.get(card);
                    if (!data) return;

                    if (data.isHovered) {
                        if (!data._lastFast || timestamp - data._lastFast > FAST_INTERVAL) {
                            data._lastFast = timestamp;
                            data.particles.forEach(p => {
                                p.el.style.left = (3 + Math.random() * 90) + '%';
                                p.el.style.top = (3 + Math.random() * 90) + '%';
                            });
                        }
                    } else {
                        if (!data._lastSlow || timestamp - data._lastSlow > SLOW_INTERVAL) {
                            data._lastSlow = timestamp;
                            refreshAmbient(card);
                        }
                    }
                });
                requestAnimationFrame(updateAllParticles);
            }

            requestAnimationFrame(updateAllParticles);

        })();
    </script>
</body>
</html>
